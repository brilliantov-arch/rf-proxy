<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РФ Прокси</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;height:100vh;background:#0d0d0d;font-family:'Inter',sans-serif;display:flex;flex-direction:column}

  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:0.5px solid #1a1a1a;flex-shrink:0}
  .logo{font-family:'Unbounded',sans-serif;font-size:11px;letter-spacing:0.15em;color:#555;text-transform:uppercase;white-space:nowrap}
  .logo span{color:#e8e0d0}
  .dot{width:7px;height:7px;border-radius:50%;background:#2a2a2a;transition:all 0.4s;flex-shrink:0}
  .dot.on{background:#c8f060;box-shadow:0 0 10px #c8f06066}
  .input-row{display:flex;flex:1;gap:8px}
  .url-input{flex:1;background:#111;border:0.5px solid #1a1a1a;border-radius:7px;padding:9px 14px;color:#888;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;min-width:0}
  .url-input:focus{border-color:#333;color:#ccc}
  .url-input::placeholder{color:#2d2d2d}
  .go-btn{background:#1a1a1a;border:0.5px solid #222;border-radius:7px;padding:9px 16px;color:#666;font-size:12px;cursor:pointer;font-family:'Unbounded',sans-serif;letter-spacing:0.05em;transition:all 0.2s;white-space:nowrap}
  .go-btn:hover{background:#222;color:#aaa}
  .go-btn.on{border-color:#c8f06055;color:#c8f060}

  .shortcuts{display:flex;gap:6px;padding:10px 20px;border-bottom:0.5px solid #1a1a1a;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
  .shortcuts::-webkit-scrollbar{display:none}
  .chip{background:#111;border:0.5px solid #1a1a1a;border-radius:20px;padding:6px 14px;font-size:12px;color:#555;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:'Unbounded',sans-serif;letter-spacing:0.05em}
  .chip:hover{border-color:#333;color:#aaa;background:#181818}
  .chip.active{border-color:#c8f06055;color:#c8f060}

  .frame-wrap{flex:1;position:relative;background:#111;overflow:hidden}
  .frame-wrap iframe{width:100%;height:100%;border:none;display:block}

  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .placeholder.hidden{display:none}
  .ph-circle{width:72px;height:72px;border-radius:50%;border:1px solid #1a1a1a;display:flex;align-items:center;justify-content:center}
  .ph-text{font-family:'Unbounded',sans-serif;font-size:11px;color:#2a2a2a;letter-spacing:0.1em;text-align:center;line-height:1.8}

  .blocked-msg{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#0d0d0d}
  .blocked-msg.show{display:flex}
  .blocked-title{font-family:'Unbounded',sans-serif;font-size:12px;color:#444;letter-spacing:0.1em}
  .blocked-sub{font-size:13px;color:#333;text-align:center;line-height:1.7;max-width:300px}
  .open-new{background:#1a1a1a;border:0.5px solid #222;border-radius:7px;padding:10px 20px;color:#666;font-size:12px;cursor:pointer;font-family:'Unbounded',sans-serif;letter-spacing:0.05em;transition:all 0.2s;margin-top:4px}
  .open-new:hover{background:#222;color:#aaa}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>РФ</span>/proxy</div>
  <div class="dot" id="dot"></div>
  <div class="input-row">
    <input class="url-input" type="text" id="urlInput" placeholder="сайт.ру" />
    <button class="go-btn" id="goBtn" onclick="openSite()">ОТКРЫТЬ</button>
  </div>
</div>

<div class="shortcuts">
  <div class="chip" onclick="quickOpen('https://rutube.ru', this)">Rutube</div>
  <div class="chip" onclick="quickOpen('https://habr.com', this)">Habr</div>
  <div class="chip" onclick="quickOpen('https://pikabu.ru', this)">Pikabu</div>
  <div class="chip" onclick="quickOpen('https://ria.ru', this)">РИА</div>
  <div class="chip" onclick="quickOpen('https://lenta.ru', this)">Lenta</div>
  <div class="chip" onclick="quickOpen('https://2ip.ru', this)">2ip.ru</div>
  <div class="chip" onclick="quickOpen('https://mail.ru', this)">Mail.ru</div>
</div>

<div class="frame-wrap">
  <div class="placeholder" id="placeholder">
    <div class="ph-circle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/>
      </svg>
    </div>
    <div class="ph-text">введи адрес сайта<br>и нажми открыть</div>
  </div>

  <div class="blocked-msg" id="blockedMsg">
    <div class="blocked-title">САЙТ ЗАБЛОКИРОВАН В IFRAME</div>
    <div class="blocked-sub">Этот сайт запрещает показ во фрейме.<br>Нужен прокси-сервер на Hostinger.</div>
    <button class="open-new" onclick="openInNew()">ОТКРЫТЬ В НОВОЙ ВКЛАДКЕ</button>
  </div>

  <iframe id="frame" style="display:none"></iframe>
</div>

<script>
  var currentUrl = '';
  var checkTimer = null;

  function setOn(state) {
    document.getElementById('dot').className = 'dot' + (state ? ' on' : '');
    document.getElementById('goBtn').className = 'go-btn' + (state ? ' on' : '');
  }

  function openSite() {
    var val = document.getElementById('urlInput').value.trim();
    if (!val) return;
    if (!val.startsWith('http')) val = 'https://' + val;
    loadInFrame(val);
  }

  function quickOpen(url, el) {
    document.getElementById('urlInput').value = url.replace('https://','');
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
    el.classList.add('active');
    loadInFrame(url);
  }

  function loadInFrame(url) {
    currentUrl = url;
    setOn(true);
    document.getElementById('placeholder').classList.add('hidden');
    document.getElementById('blockedMsg').classList.remove('show');
    var frame = document.getElementById('frame');
    frame.style.display = 'block';
    frame.src = '/api/proxy?url=' + encodeURIComponent(url);
    if (checkTimer) clearTimeout(checkTimer);
    checkTimer = setTimeout(function() {
      try {
        var loc = frame.contentWindow.location.href;
        if (!loc || loc === 'about:blank') showBlocked();
      } catch(e) {
        // cross-origin but loaded = probably ok, do nothing
      }
    }, 4000);
  }

  function showBlocked() {
    if (checkTimer) clearTimeout(checkTimer);
    document.getElementById('frame').style.display = 'none';
    document.getElementById('blockedMsg').classList.add('show');
  }

  function openInNew() {
    window.open(currentUrl, '_blank');
  }

  document.getElementById('urlInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') openSite();
  });

  var frame = document.getElementById('frame');
  frame.addEventListener('load', function() {
    try {
      var loc = frame.contentWindow.location.href;
      if (!loc || loc === 'about:blank') showBlocked();
    } catch(e) {}
  });
  frame.addEventListener('error', function() { showBlocked(); });
</script>
</body>
</html>
